# ============================================================
# auto-pr.yml — Automatically create Draft PRs
# ============================================================
# Triggers on push to any branch except main.
# Creates or updates a Draft Pull Request for the branch.
# ============================================================

name: Auto Draft PR

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-draft-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for existing PR
        id: check
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          EXISTING=$(curl -s -H "Authorization: Bearer *** -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=${OWNER}:${BRANCH}" \
            | python3 -c "import sys,json; prs=json.load(sys.stdin); print(next((p['number'] for p in prs if p.get('draft')), ''))" 2>/dev/null || echo "")
          echo "existing_pr=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Create or update Draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TITLE="Draft: ${BRANCH}"
          BODY="## Summary\n\nAutomated Draft PR for branch \`${BRANCH}\`.\n\n**Commit:** ${{ github.sha }}\n**Author:** ${{ github.actor }}"

          if [ -n "${{ steps.check.outputs.existing_pr }}" ]; then
            echo "Updating existing Draft PR #${{ steps.check.outputs.existing_pr }}"
            gh pr edit "${{ steps.check.outputs.existing_pr }}" \
              --title "$TITLE" \
              --body "$BODY"
          else
            echo "Creating new Draft PR for $BRANCH"
            gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --head "$BRANCH" \
              --base main \
              --draft
          fi
