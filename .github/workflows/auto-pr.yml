# ============================================================
# auto-pr.yml — Automatically create Draft PRs
# ============================================================

name: Auto Draft PR

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-draft-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update Draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TITLE="Draft: ${BRANCH}"
          STATS=$(git diff --stat origin/main...HEAD 2>/dev/null || echo "Unable to compute diff stats")
          COMMITS=$(git rev-list --count origin/main...HEAD 2>/dev/null || echo "?")
          LAST_COMMIT=$(git log --oneline -1)

          # Write body to file to avoid shell escaping issues
          {
            echo "## Summary"
            echo ""
            echo "Automated Draft PR for branch \`${BRANCH}\`."
            echo ""
            echo "**Commits:** ${COMMITS}"
            echo "**Latest:** ${LAST_COMMIT}"
            echo ""
            echo "---"
            echo ""
            echo "### Diff Stats"
            echo ""
            echo '```'
            echo "${STATS}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "**To approve:** Click \"Approve\" → PR merges automatically."
            echo "**To reject:** Click \"Request changes\" → PR closes."
          } > /tmp/pr_body.md

          # Check for existing PR
          EXISTING=$(gh pr list --state open --head "$BRANCH" --json number,isDraft \
            -q '[?isDraft==`true`].number | .[0]' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Updating existing Draft PR #$EXISTING"
            gh pr edit "$EXISTING" \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md
          else
            echo "Creating new Draft PR for $BRANCH"
            gh pr create \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md \
              --head "$BRANCH" \
              --base main \
              --draft
          fi
