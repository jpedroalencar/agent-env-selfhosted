# ============================================================
# auto-pr.yml — Automatically create Draft PRs
# ============================================================
# Triggers on push to any branch except main.
# Creates or updates a Draft Pull Request for the branch.
#
# The PR body includes diff stats for easy review.
# When the reviewer approves → pr-review.yml handles the merge.
# ============================================================

name: Auto Draft PR

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-draft-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          EXISTING=$(gh pr list --state open --head "$BRANCH" --json number,isDraft \
            -q '[?isDraft==`true`].number | .[0]' 2>/dev/null || echo "")
          echo "existing_pr=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Build PR content
        id: content
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          STATS=$(git diff --stat origin/main...HEAD 2>/dev/null || echo "Unable to compute diff stats")
          FILES_CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null | wc -l || echo "?")
          COMMITS=$(git rev-list --count origin/main...HEAD 2>/dev/null || echo "?")
          LAST_COMMIT=$(git log --oneline -1)

          # Build body using heredoc with variable substitution
          cat > /tmp/pr_body.md <<EOF
          ## Summary

          Automated Draft PR for branch \`${BRANCH}\`.

          **Commits:** ${COMMITS}
          **Files changed:** ${FILES_CHANGED}
          **Latest:** ${LAST_COMMIT}

          ---

          ### Diff Stats

          \`\`\`
          ${STATS}
          \`\`\`

          ---

          ## Review Checklist

          - [ ] Code quality and readability
          - [ ] Tests pass (check CI status)
          - [ ] No sensitive data exposed
          - [ ] Documentation updated if needed

          ---

          **To approve:** Click "Approve" → PR merges automatically.
          **To reject:** Click "Request changes" → PR closes, please comment why.
          EOF

          echo "body_file=/tmp/pr_body.md" >> "$GITHUB_OUTPUT"

      - name: Create or update Draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TITLE="Draft: ${BRANCH}"

          if [ -n "${{ steps.check.outputs.existing_pr }}" ]; then
            echo "Updating existing Draft PR #${{ steps.check.outputs.existing_pr }}"
            gh pr edit "${{ steps.check.outputs.existing_pr }}" \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md
          else
            echo "Creating new Draft PR for $BRANCH"
            gh pr create \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md \
              --head "$BRANCH" \
              --base main \
              --draft
          fi
