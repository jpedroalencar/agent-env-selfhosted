# Platform Routing Rules
# Maps user intent to persona profiles.
# Format:
#   routing:
#     <intent>:
#       profile: <profile-name>
#       skills: [<default-skills>]
#       memory_tier: persistent | working | none
#       knowledge_providers: [<provider-names>]  # ordered by priority
#
# Intents are classified by platform/dispatch/classifier.py using rule-based heuristics.

routing:
  financial_analysis:
    profile: financial-analyst
    skills:
      - stock-bull-bear-report
    memory_tier: persistent
    knowledge_providers:
      - vault
      - web

